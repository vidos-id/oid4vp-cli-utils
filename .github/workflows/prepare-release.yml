name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 0.10.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Require committed release notes file
        run: test -f .release_notes.md

      - name: Bump package versions
        run: bun run release:version ${{ inputs.version }}

      - run: bun install --lockfile-only

      - name: Commit and tag release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json bun.lock packages .github/workflows scripts/release-version.ts
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "v${VERSION}"
