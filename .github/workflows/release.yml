name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - run: bun run check-types

      - run: bun test

      - run: bun run build

      - name: Require release notes file
        run: test -f .release_notes.md

      - name: Publish npm packages
        run: bun run publish

      - name: Prepare release artifacts
        run: |
          cp packages/wallet-cli/dist/index.mjs openid4vc-wallet.mjs
          cp packages/issuer-cli/dist/index.mjs openid4vc-issuer.mjs
          chmod +x openid4vc-wallet.mjs openid4vc-issuer.mjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .release_notes.md
          files: |
            openid4vc-wallet.mjs
            openid4vc-issuer.mjs

      - name: Delete consumed release notes file
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin "${DEFAULT_BRANCH}"
          git switch -C "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"
          if [ ! -f .release_notes.md ]; then
            exit 0
          fi
          rm .release_notes.md
          git add .release_notes.md
          git commit -m "chore: clear release notes after ${GITHUB_REF_NAME}"
          git push origin "${DEFAULT_BRANCH}"
