name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install

      - run: bun run build

      - name: Prepare release artifacts
        run: |
          cp dist/wallet-cli/index.js wallet-cli.js
          cp dist/issuer-cli/index.js issuer-cli.js
          chmod +x wallet-cli.js issuer-cli.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wallet-cli.js
            issuer-cli.js
