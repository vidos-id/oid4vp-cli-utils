name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 0.10.0)
        required: true
        type: string
      generate_ai_release_notes:
        description: Generate release notes with OpenCode Zen instead of GitHub automatic release notes
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: test "${GITHUB_REF_NAME}" = "${DEFAULT_BRANCH}"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Generate AI release notes
        if: ${{ inputs.generate_ai_release_notes }}
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: bun run release:notes ${{ inputs.version }}

      - name: Require AI release notes file
        if: ${{ inputs.generate_ai_release_notes }}
        run: test -f .release_notes.md

      - name: Bump package versions
        run: bun run release:version ${{ inputs.version }}

      - name: Resolve npm dist-tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          case "${VERSION}" in
            *-rc.*)
              echo "NPM_DIST_TAG=rc" >> "$GITHUB_ENV"
              ;;
            *-beta.*)
              echo "NPM_DIST_TAG=beta" >> "$GITHUB_ENV"
              ;;
            *-alpha.*)
              echo "NPM_DIST_TAG=alpha" >> "$GITHUB_ENV"
              ;;
            *-*)
              echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
              ;;
            *)
              echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
              ;;
          esac

      - run: bun install --lockfile-only

      - run: bun run check-types

      - run: bun run test

      - run: bun run build

      - name: Commit release version and create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json bun.lock packages .github/workflows scripts/release-version.ts scripts/generate-release-notes.ts
          if [ "${{ inputs.generate_ai_release_notes }}" = "true" ] && [ -f .release_notes.md ]; then
            git add .release_notes.md
          fi
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"

      - name: Publish npm packages
        env:
          NPM_CONFIG_TAG: ${{ env.NPM_DIST_TAG }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_CONFIG_TOKEN }}
        run: bun run package-publish

      - name: Push release commit and tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "v${VERSION}"

      - name: Create GitHub Release with AI notes
        if: ${{ inputs.generate_ai_release_notes }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          body_path: .release_notes.md

      - name: Create GitHub Release with automatic notes
        if: ${{ !inputs.generate_ai_release_notes }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
